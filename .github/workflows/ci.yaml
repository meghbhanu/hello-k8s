name: CI — Build, Push, Deploy

on:
  push:
    branches:
      - main                        # only runs on pushes to main
    paths-ignore:
      - 'k8s/**'                    # CRITICAL: prevents infinite loop
      - '**.md'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hello-k8s

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -v

  # ── Job 2: Build & Push ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test                     # only runs if tests pass
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          # Tag = short git SHA, e.g. "a3f8c21"
          # This makes every image uniquely traceable to a commit
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

  # ── Job 3: Update k8s YAML ───────────────────────────────────────────────────
  update-manifest:
    name: Update deployment manifest
    runs-on: ubuntu-latest
    needs: build-and-push           # only runs after image is pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in deployment.yaml
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.image_tag }}
          
          # Replace the image line with the new tag
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${NEW_TAG}|" k8s/deployment.yaml
          
          echo "Updated deployment.yaml to use tag: ${NEW_TAG}"
          cat k8s/deployment.yaml   # print so you can see it in the logs

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push