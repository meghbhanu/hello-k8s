apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-k8s
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/meghbhanu/hello-k8s.git
    targetRevision: HEAD
    path: k8s                        # ArgoCD watches this folder
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true                    # delete resources removed from git
      selfHeal: true                 # revert manual kubectl changes